approval_policy = "on-request"
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"
personality = "pragmatic"
project_doc_max_bytes = 65536
review_model = "gpt-5.5"
sandbox_mode = "workspace-write"
service_tier = "fast"

[agents]
max_depth = 2
max_threads = 6

[analytics]
enabled = true

[auto_review]
policy = "Block on: correctness regressions, security risks, data loss, missing tests\nfor new behavior. Do not block on style. Lead with the highest-severity item.\n"

[feedback]
enabled = true

[history]
persistence = "save-all"

[[hooks.PermissionRequest]]
matcher = "^Bash$"

[[hooks.PermissionRequest.hooks]]
command = "/Users/mackay/.dotfiles/config/codex/script/permission-request.sh"
statusMessage = "Checking approval request"
timeout = 10
type = "command"

[[hooks.PostToolUse]]
matcher = "Edit|Write|^apply_patch$"

[[hooks.PostToolUse.hooks]]
command = "/Users/mackay/.dotfiles/config/codex/script/post-edit-check.sh"
statusMessage = "Checking edited files"
timeout = 30
type = "command"

[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
command = "/Users/mackay/.dotfiles/config/codex/script/pre-tool-policy.sh"
statusMessage = "Checking command policy"
timeout = 10
type = "command"

[marketplaces.openai-bundled]
source = "/Users/mackay/.dotfiles/config/codex/.tmp/bundled-marketplaces/openai-bundled"
source_type = "local"

[marketplaces.openai-primary-runtime]
source_type = "local"
source = "/Users/mackay/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"

[marketplaces.claude-plugins-official]
source_type = "git"
source = "https://github.com/anthropics/claude-plugins-official.git"

[marketplaces.openai-codex]
source_type = "git"
source = "https://github.com/openai/codex-plugin-cc.git"

[plugins."browser-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."code-simplifier@claude-plugins-official"]
enabled = true

[plugins."codex@openai-codex"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[sandbox_workspace_write]
network_access = false
writable_roots = [ "/Users/mackay/.dotfiles/config/codex", "/private/tmp" ]

[shell_environment_policy]
ignore_default_excludes = false
inherit = "all"
web_search = "cached"

[shell_environment_policy.set]
ANTHROPIC_DEFAULT_OPUS_MODEL = "claude-opus-4-7[1m]"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
CLAUDE_CODE_NEW_INIT = "true"

[tools]
view_image = true

[tui]
animations = true
notification_condition = "unfocused"
notification_method = "auto"
notifications = [ "agent-turn-complete", "approval-requested" ]
notify = [ "/Users/mackay/.dotfiles/config/codex/script/notify.sh" ]
show_tooltips = true
status_line = [ "model-with-reasoning", "context-remaining", "current-dir", "git-branch" ]
terminal_title = [ "spinner", "project", "git-branch" ]
theme = "dark-daltonized"

